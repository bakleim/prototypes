);

const Sparkline = ({ data, color, width = 80, height = 28 }) => {
  const max = Math.max(...data), min = Math.min(...data), range = max - min || 1;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * width},${height - ((v - min) / range) * (height - 4) - 2}`).join(" ");
  return <svg width={width} height={height} style={{ display: "block" }}><polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>;
};

    </div>
    <div style={{ fontSize: 28, fontWeight: 700, color: "#091E42" }}>{value.toLocaleString()}</div>

);

const NamingConventions = () => {
  const [sel, setSel] = useState(1);
  const [vals, setVals] = useState({ client: "acme", campaign: "summer24", channel: "email", asset: "hero-cta" });
  const tmpl = namingTemplates.find(t => t.id === sel);
  const fields = tmpl.pattern.match(/\\{(\\w+)\\}/g).map(f => f.replace(/[{}]/g, ""));
  const preview = fields.map(f => vals[f] || `{${f}}`).join("_");
  return (
    <div>
      <div style={{ marginBottom: 24 }}>
        <h1 style={{ fontSize: 20, fontWeight: 700, color: "#091E42", margin: 0 }}>Naming Conventions</h1>
        <p style={{ fontSize: 13, color: "#6B778C", margin: "4px 0 0" }}>Standardize link naming across your agency</p>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16, marginBottom: 24 }}>
        {namingTemplates.map(t => (
          <div key={t.id} onClick={() => setSel(t.id)} style={{
            background: sel === t.id ? "#FFF8F5" : "#fff", borderRadius: 12, padding: "18px 20px",
            border: sel === t.id ? "2px solid #EE6123" : "1px solid #EBECF0", cursor: "pointer",
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <span style={{ fontSize: 14, fontWeight: 600, color: "#091E42" }}>{t.name}</span>
              {t.isDefault && <span style={{ fontSize: 9, fontWeight: 700, color: "#EE6123", background: "#FFF4EE", padding: "2px 8px", borderRadius: 4, textTransform: "uppercase" }}>Default</span>}
            </div>
            <div style={{ fontSize: 12, fontFamily: "monospace", color: "#6B778C", background: "#F5F7FA", padding: "6px 10px", borderRadius: 6 }}>{t.pattern}</div>
            <div style={{ fontSize: 11, color: "#6B778C", marginTop: 8 }}>e.g. {t.example}</div>
          </div>
        ))}
      </div>
      <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #EBECF0", padding: "22px" }}>
        <h2 style={{ fontSize: 15, fontWeight: 700, color: "#091E42", margin: "0 0 16px" }}>Live Preview</h2>
        <div style={{ display: "grid", gridTemplateColumns: `repeat(${fields.length}, 1fr)`, gap: 12, marginBottom: 18 }}>
          {fields.map(f => (
            <div key={f}>
              <label style={{ fontSize: 11, fontWeight: 600, color: "#6B778C", textTransform: "uppercase", letterSpacing: "0.5px", display: "block", marginBottom: 6 }}>{f}</label>
              <input type="text" value={vals[f] || ""} onChange={e => setVals({ ...vals, [f]: e.target.value })} placeholder={f}
                style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #DFE1E6", fontSize: 14, fontFamily: "monospace", boxSizing: "border-box", outline: "none" }}
                onFocus={e => e.target.style.borderColor = "#EE6123"} onBlur={e => e.target.style.borderColor = "#DFE1E6"} />
            </div>
          ))}
        </div>
        <div style={{ background: "#F5F7FA", borderRadius: 8, padding: "14px 18px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <span style={{ fontSize: 11, fontWeight: 600, color: "#6B778C", textTransform: "uppercase" }}>Generated name</span>
            <div style={{ fontSize: 16, fontWeight: 600, fontFamily: "monospace", color: "#091E42", marginTop: 4 }}>{preview}</div>
          </div>
          <button style={{ fontSize: 13, padding: "8px 20px", borderRadius: 8, border: "none", background: "#EE6123", color: "#fff", fontWeight: 600, cursor: "pointer" }}>Use this name →</button>
        </div>
      </div>
    </div>
  );
};

      <div style={{ width: 56, background: "#fff", borderRight: "1px solid #EBECF0", display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 12, flexShrink: 0 }}>
        <div style={{ marginBottom: 16 }}>
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="6" fill="#EE6123" /><path d="M7 12h10M12 7v10" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" /></svg>
        </div>
        <div style={{ width: 36, height: 36, borderRadius: 8, background: "#EE6123", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", marginBottom: 20, color: "#fff", fontSize: 20, fontWeight: 300 }}>+</div>
        <SidebarIcon icon="🏠" label="Home" active={activeTab === "home"} onClick={() => { setActiveTab("home"); setActiveClient(null); }} />
        <SidebarIcon icon="🔗" label="Links" active={activeTab === "links"} onClick={() => setActiveTab("links")} />
        <SidebarIcon icon="⊞" label="QR Codes" onClick={() => setPaintedDoor("QR Codes")} />
        <SidebarIcon icon="📄" label="Link-in-bio" onClick={() => setPaintedDoor("Link-in-bio Pages")} />
        <SidebarIcon icon="📊" label="Analytics" active={activeTab === "analytics"} onClick={() => setActiveTab("analytics")} />
        <SidebarIcon icon="🏷️" label="Campaigns" onClick={() => setPaintedDoor("Campaigns")} />
        <SidebarIcon icon="✎" label="Naming" active={activeTab === "naming"} onClick={() => setActiveTab("naming")} badge={true} />
        <div style={{ marginTop: "auto", marginBottom: 16 }}><SidebarIcon icon="⚙️" label="Settings" onClick={() => {}} /></div>
      </div>

      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <div style={{ height: 56, background: "#fff", borderBottom: "1px solid #EBECF0", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 24px", flexShrink: 0 }}>
          <div style={{ position: "relative" }}>
            <div onClick={() => setDdOpen(!ddOpen)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 12px", borderRadius: 8, border: "1px solid #DFE1E6", cursor: "pointer", fontSize: 13, fontWeight: 500, color: "#091E42" }}>
              {sel ? (<><div style={{ width: 20, height: 20, borderRadius: 5, background: sel.color, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 10 }}>{sel.icon}</div>{sel.name}</>) : (<><div style={{ width: 20, height: 20, borderRadius: 5, background: "#EE6123", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10 }}>⊞</div>All Clients</>)}
              <span style={{ fontSize: 10, color: "#6B778C", marginLeft: 4 }}>▼</span>
            </div>
            {ddOpen && (
              <div style={{ position: "absolute", top: "100%", left: 0, marginTop: 4, background: "#fff", borderRadius: 10, border: "1px solid #EBECF0", boxShadow: "0 4px 16px rgba(0,0,0,0.1)", width: 220, zIndex: 100, overflow: "hidden" }}>
                <div onClick={() => { setActiveClient(null); setActiveTab("home"); setDdOpen(false); }} style={{ padding: "10px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: "#091E42" }}
                  onMouseEnter={e => e.currentTarget.style.background = "#F5F7FA"} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                  <div style={{ width: 24, height: 24, borderRadius: 6, background: "#EE6123", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11 }}>⊞</div> All Clients
                </div>
                {clients.map(c => (
                  <div key={c.id} onClick={() => { setActiveClient(c.id); setActiveTab("home"); setDdOpen(false); }} style={{ padding: "10px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: "#091E42" }}
                    onMouseEnter={e => e.currentTarget.style.background = "#F5F7FA"} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                    <div style={{ width: 24, height: 24, borderRadius: 6, background: c.color, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 11 }}>{c.icon}</div> {c.name}
                  </div>
                ))}
                <div onClick={() => { setPaintedDoor("Add Client Workspace"); setDdOpen(false); }} style={{ padding: "10px 14px", borderTop: "1px solid #EBECF0", cursor: "pointer", fontSize: 13, color: "#6B778C" }}>+ Add client workspace</div>
              </div>
            )}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 14px", borderRadius: 8, border: "1px solid #DFE1E6", background: "#F5F7FA", color: "#6B778C", fontSize: 13 }}>🔍 Search...</div>
            <span style={{ fontSize: 18, color: "#6B778C", cursor: "pointer" }}>❓</span>
            <span style={{ fontSize: 18, color: "#6B778C", cursor: "pointer" }}>⚙️</span>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 32, height: 32, borderRadius: 16, background: "#4C6EF5", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 12 }}>BK</div>
              <div><div style={{ fontSize: 12, fontWeight: 600, color: "#091E42" }}>Ben Kleiman</div><div style={{ fontSize: 10, color: "#6B778C" }}>Ben Kleiman</div></div>
            </div>
          </div>
        </div>

        <div style={{ flex: 1, overflow: "auto", padding: "24px 32px" }} onClick={() => ddOpen && setDdOpen(false)}>
          {activeTab === "naming" ? <NamingConventions /> : activeClient ? <ClientView clientId={activeClient} goBack={() => setActiveClient(null)} /> : <AgencyDashboard onSelectClient={id => setActiveClient(id)} setPaintedDoor={setPaintedDoor} />}
        </div>
      </div>

      {paintedDoor && <PaintedDoorModal feature={paintedDoor} onClose={() => setPaintedDoor(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<BitlyAgencyMode />);
  </script>
</body>
</html>
